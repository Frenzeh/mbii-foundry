name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: go_module
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: go_module/go.sum

      - name: Install Fyne system deps (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev xorg-dev libasound2-dev \
            libxxf86vm-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build -v ./...

      - name: gofmt check
        if: runner.os == 'Linux'
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: go test
        run: go test ./...
